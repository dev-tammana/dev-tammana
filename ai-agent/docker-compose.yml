version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  agent:
    build: .
    container_name: ai-agent-app
    ports:
      - "8000:8000"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - ENKRYPTAI_API_KEY=${ENKRYPTAI_API_KEY}
      - ENKRYPTAI_POLICY=${ENKRYPTAI_POLICY:-default-policy}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    restart: always

volumes:
  qdrant_storage:
